server {
    listen 80;
    server_name localhost;

    # Onde os arquivos do frontend compilados ficarão
    root /usr/share/nginx/html;
    index index.html;

    # Habilitar compressão (Opcional, mas melhora performance)
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Resolve o SPA do Vue Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Reverso para a API REST do Backend
    location /api/ {
        # 'backend' é o nome do container no docker-compose
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Reverso para os WebSockets do Socket.io
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
