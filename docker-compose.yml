version: '3.8'

services:
  db:
    image: postgres:17
    container_name: monitorflow-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: monitorflow
    ports:
      - "5434:5432"
    volumes:
      - monitorflow-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monitorflow-backend
    restart: always
    depends_on:
      - db
    environment:
      # Variáveis de Configuração Internas (conforme no seu .env)
      DATABASE_URL: postgresql://postgres:password@db:5432/monitorflow
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: monitor-flow-super-secret-key-change-in-production
      JWT_EXPIRES_IN: 24h
      # As variáveis MAIL_, e INTERVAL vêm do seu ambiente se necessário aqui...
      FRONTEND_URL: http://localhost
      MONITOR_INTERVAL: 10000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: monitorflow-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  monitorflow-data:
